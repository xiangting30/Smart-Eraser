<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Eraser | 智能去水印</title>
    <style>
        :root { --primary: #4361ee; --bg: #f8f9fa; }
        body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: var(--bg); color: #333; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { background: #fff; width: 90%; max-width: 1000px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); padding: 40px; text-align: center; }
        h1 { font-weight: 300; letter-spacing: 1px; color: #1a1a1a; margin-bottom: 10px; }
        p { color: #888; margin-bottom: 30px; }
        
        /* 拖拽上传区 */
        #drop-zone { border: 2px dashed #d1d5db; border-radius: 15px; padding: 40px; transition: all 0.3s; background: #fafafa; cursor: pointer; position: relative; }
        #drop-zone.hover { border-color: var(--primary); background: #f0f3ff; }
        
        /* 画布容器 */
        #canvas-wrapper { display: none; margin-top: 20px; position: relative; border-radius: 10px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        canvas { display: block; max-width: 100%; cursor: crosshair; }

        .btn-group { margin-top: 30px; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 30px; font-size: 16px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(67, 97, 238, 0.4); }
        .btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
        
        /* 进度条样式 */
        #loading-overlay { display: none; margin-top: 25px; text-align: left; max-width: 400px; margin-left: auto; margin-right: auto; }
        .progress-text-container { display: flex; justify-content: space-between; font-weight: bold; color: var(--primary); margin-bottom: 8px;}
        .progress-bar-bg { width: 100%; background-color: #e9ecef; border-radius: 10px; height: 12px; overflow: hidden;}
        .progress-bar-fill { height: 100%; background-color: var(--primary); width: 0%; transition: width 0.3s ease; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>Smart Eraser</h1>
    <p>图像与动态视频水印移除工具</p> <div id="drop-zone">
        <div id="drop-text">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            <p style="margin-top:10px">拖拽文件到此处 或 <strong>点击上传</strong></p>
        </div>
        <input type="file" id="fileInput" hidden accept="image/*,video/*">
    </div>

    <div id="canvas-wrapper">
        <canvas id="canvas"></canvas>
        <p style="margin-top: 10px; font-size: 12px; color: #666;">提示：可以在画面上多次框选以移除多个水印</p>
    </div>

    <div class="btn-group">
        <button id="processBtn" class="btn" style="display:none">开始去水印</button> </div>

    <div id="loading-overlay">
        <div class="progress-text-container">
            <span>正在处理，请耐心等待...</span>
            <span id="progress-text">0%</span>
        </div>
        <div class="progress-bar-bg">
            <div id="progress-bar-fill" class="progress-bar-fill"></div>
        </div>
    </div>
    <div id="resultArea"></div>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('fileInput');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const canvasWrapper = document.getElementById('canvas-wrapper');
    const processBtn = document.getElementById('processBtn');

    let filePath = '', bgImg = new Image();
    
    // 支持多个框选的变量
    let rects = []; 
    let currentRect = null;
    let drag = false;

    dropZone.onclick = () => fileInput.click();
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('hover'); };
    dropZone.ondragleave = () => dropZone.classList.remove('hover');
    dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove('hover');
        handleFile(e.dataTransfer.files[0]);
    };
    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    async function handleFile(file) {
        if (!file) return;
        const formData = new FormData();
        formData.append('file', file);
        
        document.getElementById('drop-text').innerText = "正在读取文件...";
        
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();
        filePath = data.path;

        bgImg.onload = () => {
            canvasWrapper.style.display = 'block';
            dropZone.style.display = 'none';
            processBtn.style.display = 'inline-block';
            canvas.width = bgImg.width;
            canvas.height = bgImg.height;
            rects = []; // 重置所有框
            draw();
        };
        bgImg.src = data.preview_url ? data.preview_url : URL.createObjectURL(file);
    }

    // 2. 多框选逻辑
    canvas.onmousedown = (e) => {
        const b = canvas.getBoundingClientRect();
        const scaleX = canvas.width / b.width;
        const scaleY = canvas.height / b.height;
        currentRect = {
            x: (e.clientX - b.left) * scaleX,
            y: (e.clientY - b.top) * scaleY,
            w: 0,
            h: 0
        };
        drag = true;
    };
    
    canvas.onmousemove = (e) => {
        if (!drag || !currentRect) return;
        const b = canvas.getBoundingClientRect();
        currentRect.w = ((e.clientX - b.left) * (canvas.width / b.width)) - currentRect.x;
        currentRect.h = ((e.clientY - b.top) * (canvas.height / b.height)) - currentRect.y;
        draw();
    };

    canvas.onmouseup = () => {
        if (!drag) return;
        drag = false;
        
        // 过滤掉太小的误触点击，并处理反向框选（负向长宽）
        if (currentRect && Math.abs(currentRect.w) > 5 && Math.abs(currentRect.h) > 5) {
            rects.push({
                x: currentRect.w < 0 ? currentRect.x + currentRect.w : currentRect.x,
                y: currentRect.h < 0 ? currentRect.y + currentRect.h : currentRect.y,
                w: Math.abs(currentRect.w),
                h: Math.abs(currentRect.h)
            });
        }
        currentRect = null;
        draw();
    };

    function draw() {
        ctx.drawImage(bgImg, 0, 0);
        ctx.strokeStyle = '#4361ee';
        ctx.lineWidth = 4;
        ctx.setLineDash([6, 6]);

        // 绘制所有已保存的框
        rects.forEach(r => {
            ctx.strokeRect(r.x, r.y, r.w, r.h);
            ctx.fillStyle = 'rgba(67, 97, 238, 0.2)';
            ctx.fillRect(r.x, r.y, r.w, r.h);
        });

        // 绘制当前正在拖拽的框
        if (currentRect) {
            ctx.strokeRect(currentRect.x, currentRect.y, currentRect.w, currentRect.h);
            ctx.fillStyle = 'rgba(67, 97, 238, 0.2)';
            ctx.fillRect(currentRect.x, currentRect.y, currentRect.w, currentRect.h);
        }
    }

    // 3. 提交处理带进度条
    processBtn.onclick = async () => {
        if (rects.length === 0) {
            alert("请至少框选一个水印区域！");
            return;
        }

        document.getElementById('loading-overlay').style.display = 'block';
        processBtn.disabled = true;
        processBtn.innerText = "处理中...";

        // 生成唯一任务ID，用于拉取进度
        const taskId = "task_" + Date.now();
        
        // 提取所有框的整数坐标
        const roisData = rects.map(r => [Math.floor(r.x), Math.floor(r.y), Math.floor(r.w), Math.floor(r.h)]);

        // 开启进度条轮询查询
        const progressInterval = setInterval(async () => {
            try {
                const res = await fetch(`/progress/${taskId}`);
                const pData = await res.json();
                document.getElementById('progress-text').innerText = pData.progress + '%';
                document.getElementById('progress-bar-fill').style.width = pData.progress + '%';
            } catch (e) { console.error("进度获取失败", e); }
        }, 800);

        try {
            const response = await fetch('/remove', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    path: filePath, 
                    rois: roisData,
                    task_id: taskId
                })
            });
            const data = await response.json();
            
            // 清除轮询器，强制满进度
            clearInterval(progressInterval);
            document.getElementById('progress-text').innerText = '100%';
            document.getElementById('progress-bar-fill').style.width = '100%';

            document.getElementById('resultArea').innerHTML = `
                <div style="margin-top:20px">
                    <p>✨ 处理完成！</p>
                    <a href="${data.result_url}" download class="btn" style="background:#2ec4b6">下载结果文件</a>
                    <button onclick="location.reload()" class="btn" style="background:#6c757d; margin-left:10px">继续处理</button>
                </div>
            `;
        } catch (error) {
            clearInterval(progressInterval);
            alert("处理时发生错误，请重试");
        }
    };
</script>
</body>
</html>
